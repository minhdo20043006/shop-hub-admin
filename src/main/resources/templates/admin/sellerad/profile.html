<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/admin :: content(~{this :: body})}">

<body>
	<div class="container-fluid">

		<!-- TITLE -->
		<h1 class="h3 mb-4 text-gray-800">
			<i class="fas fa-store mr-2"></i>Danh sách cửa hàng (Seller)
		</h1>

		<div class="card shadow-sm mb-4">
			<div class="card-header py-3 d-flex justify-content-between align-items-center">
				<h6 class="m-0 font-weight-bold text-primary">
					Thông tin Seller Profile
				</h6>
			</div>

			<div class="card-body">
				<div class="table-responsive">

					<table class="table table-bordered table-hover align-middle text-center">
						<thead class="thead-light">
							<tr>
								<th>ID</th>
								<th>Logo</th>
								<th>Chủ cửa hàng</th>
								<th>Tên cửa hàng</th>
								<th>Mã số thuế</th>
								<th>Giấy phép KD</th>
								<th>Địa chỉ</th>
								<th>Đánh giá</th>
								<th>Trạng thái</th>
								<th>Ngày tạo</th>
								<th>Hành động</th>
							</tr>
						</thead>

						<tbody>
							<tr th:each="s : ${sellerProfiles}"
								th:onclick="|window.location.href='@{/admin/sellerad/detail/{id}(id=${s.id})}'|"
								style="cursor:pointer;">

								<td th:text="${s.id}"></td>

								<!-- LOGO -->
								<td>
									<img th:src="@{'/assets/images/' + ${s.logo}}" class="rounded shadow-sm"
										style="width:55px;height:55px;object-fit:cover;">
								</td>

								<!-- ACCOUNT -->
								<td th:text="${s.accountName}" class="font-weight-bold"></td>

								<!-- STORE -->
								<td th:text="${s.storeName}"></td>

								<td th:text="${s.taxCode}"></td>

								<td th:text="${s.businessLicenseNumber}"></td>

								<td class="text-left" th:text="${s.storeAddress}"></td>

								<!-- RATING -->
								<td>
									<span class="badge badge-info">
										<i class="fas fa-star mr-1"></i>
										<span th:text="${s.avgRating}"></span>
										(<span th:text="${s.reviewCount}"></span>)
									</span>
								</td>

								<!-- STATUS -->
								<td>
									<span class="badge px-3 py-2" th:text="${s.approvedStatus}" th:classappend="
                                  ${s.approvedStatus.name() == 'APPROVED'} ? ' badge-success' :
                                  (${s.approvedStatus.name() == 'PENDING'} ? ' badge-warning' :
                                  (${s.approvedStatus.name() == 'DISABLED'} ? ' badge-secondary' :
                                  ' badge-danger'))
                                  ">
									</span>
								</td>

								<td th:text="${#dates.format(s.createdAt,'dd/MM/yyyy')}"></td>

								<!-- ACTION -->
								<td onclick="event.stopPropagation();">

									<!-- PENDING → DUYỆT -->
									<a th:href="@{/admin/sellerad/approve/{id}(id=${s.id})}"
										class="btn btn-sm btn-success mb-1"
										th:if="${s.approvedStatus.name() == 'PENDING'}">
										Duyệt
									</a>

									<!-- PENDING / APPROVED → TỪ CHỐI -->
									<a th:href="@{/admin/sellerad/reject/{id}(id=${s.id})}"
										class="btn btn-sm btn-danger mb-1"
										th:if="${s.approvedStatus.name() != 'REJECTED'}">
										Từ chối
									</a>

									<!-- REJECTED → KHÔI PHỤC -->
									<a th:href="@{/admin/sellerad/restore/{id}(id=${s.id})}"
										class="btn btn-sm btn-warning" th:if="${s.approvedStatus.name() == 'REJECTED'}">
										Khôi phục
									</a>

								</td>

							</tr>

							<!-- EMPTY -->
							<tr th:if="${#lists.isEmpty(sellerProfiles)}">
								<td colspan="11" class="text-center text-muted py-4">
									<i class="fas fa-store-slash fa-2x mb-2"></i><br>
									Chưa có seller nào
								</td>
							</tr>

						</tbody>
					</table>

				</div>
			</div>
		</div>

	</div>
</body>

</html>
