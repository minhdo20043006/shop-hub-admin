<!DOCTYPE html>
<html lang="en">

<head>

	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
	<meta name="description" content="">
	<meta name="author" content="">

	<title>SB Admin 2 - Register</title>

	<!-- Custom fonts for this template-->
	<link th:href="@{/assets/seller/vendor/fontawesome-free/css/all.min.css}" rel="stylesheet" type="text/css">
	<link
		href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i"
		rel="stylesheet">

	<!-- Custom styles for this template-->
	<link th:href="@{/assets/seller/css/sb-admin-2.min.css}" rel="stylesheet">

</head>

<body class="bg-gradient-primary">
	<th:block th:text="${error}"></th:block>
	<div class="container">

		<div class="card o-hidden border-0 shadow-lg my-5">
			<div class="card-body p-0">
				<!-- Nested Row within Card Body -->
				<div class="row">
					<div class="col-lg-5 d-none d-lg-block bg-register-image"></div>
					<div class="col-lg-7">
						<div class="p-5">
							<div class="text-center">
								<h1 class="h4 text-gray-900 mb-2">Đăng ký trở thành Người Bán</h1>
								<p class="text-muted mb-4">
									Bắt đầu kinh doanh online cùng <b>ShopHup</b>
								</p>

							</div>
							<form class="user" th:action="@{/seller/create}" th:object="${seller}" method="post">

								<div class="form-group">
									<input type="text" class="form-control form-control-user" placeholder="Tên cửa hàng"
										th:field="*{storeName}">
								</div>

								<div class="form-group">
									<input type="text" class="form-control form-control-user"
										placeholder="Số điện thoại" th:field="*{businessLicenseNumber}">
								</div>

								<div class="form-group">
									<input type="text" class="form-control form-control-user"
										placeholder="Địa chỉ cửa hàng" th:field="*{storeAddress}">
								</div>
								<div class="form-group">
									<input type="text" class="form-control form-control-user" placeholder="Mã số Thuế"
										th:field="*{taxCode}">
								</div>

								<div class="form-group">
									<textarea class="form-control form-control-user"
										style="border-radius: 20px; padding: 15px;" rows="3"
										placeholder="Mô tả ngắn về cửa hàng" th:field="*{description}"></textarea>
								</div>

								<button class="btn btn-primary btn-user btn-block" type="submit">
									<i class="fas fa-store me-1"></i>
									Gửi đăng ký bán hàng
								</button>

							</form>

							<hr>
							<div class="text-center">
								<a class="small" href="forgot-password.html">Forgot Password?</a>
							</div>
							<div class="text-center">
								<a class="small" href="login.html">Already have an account? Login!</a>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>

	</div>

	<!-- Bootstrap core JavaScript-->
	<script th:src="@{/assets/seller/vendor/jquery/jquery.min.js}"></script>
	<script th:src="@{/assets/seller/vendor/bootstrap/js/bootstrap.bundle.min.js}"></script>

	<!-- Core plugin JavaScript-->
	<script th:src="@{/assets/seller/vendor/jquery-easing/jquery.easing.min.js}"></script>

	<!-- Custom scripts for all pages-->
	<script th:src="@{/assets/seller/js/sb-admin-2.min.js}"></script>

</body>

</html>
