</head>

<body>


	<!-- Start Hero Section -->
	<div class="hero">
		<div class="container">
			<div class="row justify-content-between">
				<div class="col-lg-5">
					<div class="intro-excerpt">
						<h1>Shop</h1>
					</div>
				</div>

				<div th:if="${notiMessage}" class="noti-banner">
					<strong th:text="${notiTitle}"></strong>
					<p th:text="${notiMessage}"></p>
				</div>




			</div>
		</div>
	</div>
	<!-- End Hero Section -->

	<div class="untree_co-section product-section before-footer-section">
		<div class="container">
			<div class="row">

				<!-- ===== FILTER LEFT ===== -->
				<div class="col-lg-3">

					<form method="get" action="/product/index">

						<!-- Search -->
						<div class="mb-4">
							<input type="text" name="keyword" class="form-control" placeholder="Tìm sản phẩm..."
								th:value="${keyword}">
						</div>

						<!-- Category -->
						<div class="mb-4">
							<h6 class="fw-bold">Danh mục</h6>

							<select name="categoryId" class="form-select" onchange="this.form.submit()">

								<option value="">-- Tất cả --</option>

								<option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.nameCategory}"
									th:selected="${c.id == selectedCategory}">
								</option>
							</select>
						</div>

						<!-- Price -->
						<div class="mb-4">
							<h6 class="fw-bold">Giá</h6>

							<select name="priceCode" class="form-select">
								<option value="">-- Tất cả --</option>

								<option value="UNDER_1M" th:selected="${selectedPriceCode == 'UNDER_1M'}">
									Dưới 1 triệu
								</option>

								<option value="UNDER_3M" th:selected="${selectedPriceCode == 'UNDER_3M'}">
									Dưới 3 triệu
								</option>

								<option value="UNDER_5M" th:selected="${selectedPriceCode == 'UNDER_5M'}">
									Dưới 5 triệu
								</option>

								<option value="UNDER_10M" th:selected="${selectedPriceCode == 'UNDER_10M'}">
									Dưới 10 triệu
								</option>

								<option value="UNDER_15M" th:selected="${selectedPriceCode == 'UNDER_15M'}">
									Dưới 15 triệu
								</option>

								<option value="ABOVE_50M" th:selected="${selectedPriceCode == 'ABOVE_50M'}">
									Trên 50 triệu
								</option>
							</select>

						</div>

						<button class="btn btn-primary w-100">
							Lọc sản phẩm
						</button>

					</form>

				</div>

				<!-- ===== PRODUCT RIGHT ===== -->
				<div class="col-lg-9">
					<div class="row">

						<div class="col-12 col-md-6 col-lg-4 mb-4" th:each="product : ${products}">

							<a class="product-item"
								th:href="@{'/product/productDetail/'+${product.id}+'/'+${product.categoryId}}">

								<img th:src="@{'/assets/images/'+${product.photo}}" class="img-fluid product-thumbnail">

								<h3 class="product-title" th:text="${product.nameProduct}"></h3>

								<strong class="product-price" th:text="${product.price}"></strong>

							</a>
							<form th:action="@{/cart/buy-now}" method="post">
							    <input type="hidden" name="productId" th:value="${product.id}">
							    <button class="btn btn-danger">Mua ngay</button>
							</form>

						</div>

					</div>
				</div>

			</div>
		</div>
	</div>
