<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/user :: content(~{this :: body})}">

<head>

</head>

<body>

	<!-- Start Hero Section -->
	<div class="hero">
		<div class="container">
			<div class="row justify-content-between">
				<div class="col-lg-5">
					<div class="intro-excerpt">
						<h1>Cart</h1>
					</div>
				</div>
				<div class="col-lg-7">

				</div>
			</div>
		</div>
	</div>
	<!-- End Hero Section -->



	<div class="untree_co-section before-footer-section">
		<div class="container">
			<div class="row mb-5">
				<form class="col-md-12" method="post">
					<div class="site-blocks-table">
						<table class="table">
							<thead>
								<tr>
									<th class="product-thumbnail">Image</th>
									<th class="product-name">Product</th>
									<th class="product-price">Price</th>
									<th class="product-quantity">Quantity</th>
									<th class="product-total">Total</th>
									<th class="product-remove">Remove</th>
								</tr>
							</thead>
							<tbody>
								<tr th:each="item : ${cartItems}">
									<td class="product-thumbnail">
										<img th:src="@{'/assets/images/' + ${item.productPhoto}}" class="img-fluid">
									</td>

									<td class="product-name">
										<h2 class="h5 text-black" th:text="${item.productName}"></h2>
									</td>

									<td class="product-price" th:text="${item.price}"></td>

									<td>
										<div class="input-group mb-3 d-flex align-items-center quantity-container"
											style="max-width:120px;">

											<button class="btn btn-outline-black" type="button"
												onclick="changeQty(this, -1)">−</button>

											<input type="text" class="form-control text-center quantity-amount"
												th:value="${item.quantityCart}" th:attr="data-price=${item.price}"
												readonly>

											<button class="btn btn-outline-black" type="button"
												onclick="changeQty(this, 1)">+</button>
										</div>
									</td>

									<td class="item-total" th:text="${item.price * item.quantityCart}">
									</td>


									<td>
										<button type="button" class="btn btn-black btn-sm"
											th:onclick="|removeItem(this, ${item.id})|">
											X
										</button>
									</td>

								</tr>




							</tbody>
						</table>
					</div>
				</form>
			</div>

			<div class="row">
				<div class="col-md-6">
					<div class="row mb-5">
						<div class="col-md-6 mb-3 mb-md-0">
							<button class="btn btn-black btn-sm btn-block">Update Cart</button>
						</div>
						<div class="col-md-6">
							<a th:href="@{/product}">
								<button type="button" class="btn btn-outline-black btn-sm btn-block">
									Continue Shopping
								</button>
							</a>
						</div>
					</div>
					<div class="row">
						<div class="col-md-12">
							<label class="text-black h4" for="coupon">Coupon</label>
							<p>Enter your coupon code if you have one.</p>
						</div>
						<div class="col-md-8 mb-3 mb-md-0">
							<input type="text" class="form-control py-3" id="coupon" placeholder="Coupon Code">
						</div>
						<div class="col-md-4">
							<button class="btn btn-black" onclick="applyCoupon()">Apply Coupon</button>
						</div>
					</div>
				</div>
				<div class="col-md-6 pl-5">
					<div class="row justify-content-end">
						<div class="col-md-7">
							<div class="row">
								<div class="col-md-12 text-right border-bottom mb-5">
									<h3 class="text-black h4 text-uppercase">Cart Totals</h3>
								</div>
							</div>
							<div class="row mb-3">
								<div class="col-md-6">
									<span class="text-black">Subtotal</span>
								</div>
								<div class="col-md-6 text-right">
									<strong class="text-black" id="cart-subtotal">$0</strong>
								</div>
							</div>

							<div class="row mb-3">
								<div class="col-md-6">
									<span class="text-black">Discount</span>
								</div>
								<div class="col-md-6 text-right">
									<strong class="text-black" id="cart-discount">$0</strong>
								</div>
							</div>

							<div class="row mb-5">
								<div class="col-md-6">
									<span class="text-black">Total</span>
								</div>
								<div class="col-md-6 text-right">
									<strong class="text-black" id="cart-total">$0</strong>
								</div>
							</div>

							<!-- CHU Y SU LY DU LIEU XONG MOI DA VE TRANG -->
							<div class="row">
								<div class="col-md-12">
									<button class="btn btn-black btn-lg py-3 btn-block"
										onclick="window.location='cart/checkout'">Proceed To Checkout</button>
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>

</body>

</html>
